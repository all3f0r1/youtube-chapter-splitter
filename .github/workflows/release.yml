name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'claude/release-v*'

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Extract changelog for current version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > release_notes.md
          # Exclude the tag being released itself: on a tag-triggered push it
          # already exists in `git tag` (checkout fetched all tags), so without
          # this filter PREV_TAG would resolve to TAG and produce a vX...vX
          # (empty) comparison link.
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -vx "$TAG" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            echo "" >> release_notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> release_notes.md
          fi
          cat release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  build-release:
    name: Build and Release
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 GNU
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          # Linux x86_64 MUSL (static binary)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/ytcs

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="ytcs-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE_NAME" -C target/${{ matrix.target }}/release ytcs
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "ARCHIVE_PATH=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ARCHIVE_NAME = "ytcs-${{ matrix.target }}.zip"
          Compress-Archive -Path target/${{ matrix.target }}/release/ytcs.exe -DestinationPath $ARCHIVE_NAME
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $env:GITHUB_ENV
          echo "ARCHIVE_PATH=$ARCHIVE_NAME" >> $env:GITHUB_ENV

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            certutil -hashfile "${{ env.ARCHIVE_NAME }}" SHA256 | grep -v "hash" | tr -d '\r\n ' > "${{ env.ARCHIVE_NAME }}.sha256"
          else
            shasum -a 256 "${{ env.ARCHIVE_NAME }}" | cut -d ' ' -f 1 > "${{ env.ARCHIVE_NAME }}.sha256"
          fi

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.ARCHIVE_PATH }}.sha256

  publish-release:
    name: Publish GitHub Release
    # Only reachable once every matrix leg of build-release has succeeded, so a
    # failed binary build can no longer leave a public, empty/partial release.
    needs: [prepare-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          echo "# SHA256 Checksums for ${TAG}" > dist/SHA256SUMS.txt
          echo "" >> dist/SHA256SUMS.txt
          for file in dist/*.sha256; do
            if [ -f "$file" ]; then
              basename="$(basename "${file%.sha256}")"
              checksum=$(cat "$file")
              echo "$checksum  $basename" >> dist/SHA256SUMS.txt
            fi
          done
          cat dist/SHA256SUMS.txt

      - name: Create release with binaries and changelog
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release_notes.md
          draft: false
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates-io:
    name: Publish to crates.io
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Version mismatch between tag ($TAG_VERSION) and Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
